# MYSQL Settings
quarkus.datasource.db-kind=mysql
quarkus.datasource.reactive.url=${DB_URL}
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.reactive.max-size=7
quarkus.datasource.reactive.idle-removal-interval=PT30S

# Connection timeout settings
quarkus.datasource.reactive.connect-timeout=600
quarkus.datasource.reactive.idle-timeout=PT30S
quarkus.datasource.reactive.max-lifetime=PT30S
quarkus.thread-pool.max-threads=10

quarkus.http.port=8086
organization-api/mp-rest/url=http://localhost:8080
%prod.organization-api/mp-rest/url=${ORG_SERVICE_URL:http://ai-solutions-organization-api.railway.internal:8080}
%staging.organization-api/mp-rest/url=${ORG_SERVICE_URL}
          
# CORS Settings frontend
quarkus.http.cors.enabled=true 
quarkus.http.cors.origins=http://localhost:4000,http://localhost:4200
%prod.quarkus.http.cors.origins=https://ai-solutions-shell-production.up.railway.app,https://customer-survey-production.up.railway.app,https://aisolutionspl.up.railway.app,https://aisolutionpl.com
%staging.quarkus.http.cors.origins=https://ai-solutions-shell-production.up.railway.app,https://customer-survey-production.up.railway.app,https://aisolutionspl.up.railway.app,https://aisolutionpl.com
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=X-Custom,Content-Type,authorization,X-Login-Type
quarkus.http.cors.exposed-headers=Content-Disposition,authorization
quarkus.http.cors.access-control-max-age=24H 
quarkus.http.cors.access-control-allow-credentials=true 

# Kafka staff-events
mp.messaging.incoming.staff-events.connector=smallrye-kafka
mp.messaging.incoming.staff-events.topic=staff.events
mp.messaging.incoming.staff-events.auto.offset.reset=latest
mp.messaging.incoming.staff-events.bootstrap.servers=localhost:9092
mp.messaging.incoming.staff-events.group.id=staff-events-group
mp.messaging.incoming.staff-events.enabled=false

# Sms Service
sms.url=${SMS_URL}
sms.username=${SMS_USERNAME}
sms.password=${SMS_PASSWORD}
sms.sender-id=${SMS_SENDER_ID}  

# GMAIL API
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
google.oauth.refresh-token=${GOOGLE_OAUTH_REFRESH_TOKEN}
mail.sender-email=${MAIL_SENDER_EMAIL}

quarkus.kafka.devservices.enabled=false

# FTP Server Connection
ftp.host=borneochemicalintl.com
ftp.port=21
ftp.username=${FTP_USERNAME}
ftp.password=${FTP_PASSWORD}
ftp.base-path=/test.borneochemicalintl.com/vendor-attachments

# SMTP Email
app.email.host=webmail.aisolutionspl.com
app.email.port=587
app.email.username=${SMTP_USERNAME}
app.email.password=${SMTP_PASSWORD}
app.email.sender-email=evaluation-no-reply@aisolutionspl.com

# Service Account (for org-api service-to-service calls)
app.service.username=${SERVICE_ACCOUNT_USERNAME}
app.service.password=${SERVICE_ACCOUNT_PASSWORD}

# Invoice action base URL (for approve/reject token links in email)
app.invoice.action-base-url=http://localhost:8086
%prod.app.invoice.action-base-url=${INVOICE_ACTION_BASE_URL}
%staging.app.invoice.action-base-url=${INVOICE_ACTION_BASE_URL}

# Vendor Administration Backend (for approve/reject callbacks)
vendor-admin-api/mp-rest/url=http://localhost:8087
%prod.vendor-admin-api/mp-rest/url=${VENDOR_ADMIN_API_URL}
%staging.vendor-admin-api/mp-rest/url=${VENDOR_ADMIN_API_URL}
